<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wand Linked</title>
  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #151b33;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.14);
      --text: #f5f7ff;
      --muted: #c7cbe3;
      --accent: #b28dff;
      --accent-2: #7ee7ff;
      --glow: rgba(178, 141, 255, 0.45);
      --success: #9ef0c0;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #24315f 0%, transparent 35%),
        radial-gradient(circle at 20% 80%, #1a2346 0%, transparent 30%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .sparkles,
    .sparkles::before,
    .sparkles::after {
      position: absolute;
      inset: 0;
      content: "";
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(178,141,255,0.8) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(126,231,255,0.8) 0 1px, transparent 1.5px);
      background-size: 140px 140px, 180px 180px, 220px 220px;
      background-position: 10px 20px, 70px 100px, 40px 60px;
      opacity: 0.35;
      animation: drift 18s linear infinite;
    }

    .sparkles::before {
      animation-duration: 24s;
      opacity: 0.2;
      transform: scale(1.1);
    }

    .sparkles::after {
      animation-duration: 30s;
      opacity: 0.15;
      transform: scale(1.2);
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-40px); }
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 28px 24px;
      text-align: center;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.35),
        0 0 40px rgba(126, 231, 255, 0.08),
        0 0 60px rgba(178, 141, 255, 0.08);
      position: relative;
      z-index: 1;
    }

    .icon-wrap {
      width: 92px;
      height: 92px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 45%),
        linear-gradient(135deg, rgba(178,141,255,0.28), rgba(126,231,255,0.18));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        0 0 0 10px rgba(255,255,255,0.03),
        0 0 30px var(--glow);
    }

    .icon {
      font-size: 40px;
      line-height: 1;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.25));
    }

    .status {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--success);
      background: rgba(158, 240, 192, 0.09);
      border: 1px solid rgba(158, 240, 192, 0.18);
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 auto;
      max-width: 30ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .accent {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .footer-glow {
      margin-top: 22px;
      height: 4px;
      width: 90px;
      margin-inline: auto;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px var(--glow);
      opacity: 0.85;
    }

    @media (max-width: 380px) {
      .card {
        padding: 24px 18px;
        border-radius: 24px;
      }

      .icon-wrap {
        width: 82px;
        height: 82px;
      }

      .icon {
        font-size: 34px;
      }

      p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles" aria-hidden="true"></div>

  <main class="card">
    <div class="icon-wrap" aria-hidden="true">
      <div class="icon">✨</div>
    </div>

    <div class="status">Connection Successful</div>

    <h1>Your wand is now <span class="accent">linked</span></h1>
    <p>
      The enchantment is complete. Your wand is connected and ready to use.
    </p>

    <div class="footer-glow" aria-hidden="true"></div>
  </main>
</body>
</html>
