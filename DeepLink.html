<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Potter Wands Deep Link Launcher</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fa;
      color: #111827;
      padding: 24px;
    }

    main {
      width: min(600px, 100%);
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    p {
      margin: 8px 0;
      line-height: 1.5;
    }

    a {
      color: #1d4ed8;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening Potter Wands App</h1>
    <p id="status">Attempting to open the app...</p>
    <p>If nothing happens, <a id="manual-open-link" href="#">tap here</a>.</p>
  </main>

  <script>
    (function () {
      const pageUrl = new URL(window.location.href);
      const APP_SCHEME = pageUrl.searchParams.get("appscheme") || "potterwands";
      const APP_PATH = pageUrl.searchParams.get("apppath") || "open";
      const FALLBACK_DELAY_MS = 1800;
      const ANDROID_STORE_HOME = "https://play.google.com/store";
      const IOS_STORE_HOME = "https://apps.apple.com";

      const statusElement = document.getElementById("status");
      const manualOpenLink = document.getElementById("manual-open-link");

      const setStatus = function (message) {
        if (statusElement) {
          statusElement.textContent = message;
        }
      };

      const currentUrl = window.location.href;
      const incomingParams = new URLSearchParams(pageUrl.search);

      // Pass all incoming arguments plus the complete source URL.
      incomingParams.set("source", currentUrl);

      const query = incomingParams.toString();
      const hash = window.location.hash || "";
      const deepLinkUrl = APP_SCHEME + "://" + APP_PATH + (query ? "?" + query : "") + hash;

      if (manualOpenLink) {
        manualOpenLink.href = deepLinkUrl;
      }

      let pageWasHidden = false;
      const markHidden = function () {
        pageWasHidden = true;
      };

      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          markHidden();
        }
      });
      window.addEventListener("pagehide", markHidden);

      const userAgent = navigator.userAgent || "";
      const isAndroid = /android/i.test(userAgent);
      const isIos = /iphone|ipad|ipod/i.test(userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      const fallbackToStore = function () {
        if (pageWasHidden || document.hidden) {
          return;
        }

        if (isAndroid) {
          setStatus("App did not open. Redirecting to Google Play...");
          window.location.replace(ANDROID_STORE_HOME);
          return;
        }

        if (isIos) {
          setStatus("App did not open. Redirecting to the App Store...");
          window.location.replace(IOS_STORE_HOME);
          return;
        }

        setStatus("App did not open automatically on this device.");
      };

      setStatus("Attempting to open deep link: " + deepLinkUrl);
      window.location.href = deepLinkUrl;
      window.setTimeout(fallbackToStore, FALLBACK_DELAY_MS);
    })();
  </script>
</body>
</html>
