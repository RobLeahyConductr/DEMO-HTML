<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deep Link Redirect</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    main {
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening app...</h1>
    <p id="status">Please wait while we redirect you.</p>
  </main>

  <script>
    (function () {
      "use strict";

      const CONFIG = {
        appScheme: "yourapp",
        appPath: "open",
        androidPackage: "com.example.app",
        androidStoreHome: "https://play.google.com/store",
        iosStoreHome: "https://apps.apple.com/"
      };

      const statusEl = document.getElementById("status");
      const userAgent = navigator.userAgent || "";
      const isAndroid = /Android/i.test(userAgent);
      const isIOS = /iPhone|iPad|iPod/i.test(userAgent);

      function setStatus(message) {
        if (statusEl) {
          statusEl.textContent = message;
        }
      }

      function buildAppUrl() {
        const currentUrl = new URL(window.location.href);
        const appUrl = new URL(CONFIG.appScheme + "://" + CONFIG.appPath);

        appUrl.searchParams.set("sourceUrl", currentUrl.href);

        currentUrl.searchParams.forEach(function (value, key) {
          appUrl.searchParams.append(key, value);
        });

        return appUrl.toString();
      }

      function redirectToStore() {
        if (isAndroid) {
          window.location.replace(CONFIG.androidStoreHome);
          return;
        }

        if (isIOS) {
          window.location.replace(CONFIG.iosStoreHome);
          return;
        }

        setStatus("This page is intended for Android or iOS devices.");
      }

      function tryOpenApp() {
        const appUrl = buildAppUrl();
        let appOpened = false;

        document.addEventListener("visibilitychange", function () {
          if (document.hidden) {
            appOpened = true;
          }
        });

        setTimeout(function () {
          if (!appOpened) {
            redirectToStore();
          }
        }, 1800);

        if (isAndroid) {
          const deepLink = new URL(appUrl);
          const intentUrl = "intent://" + CONFIG.appPath + deepLink.search +
            "#Intent;scheme=" + CONFIG.appScheme + ";package=" + CONFIG.androidPackage + ";end";
          window.location.href = intentUrl;
          return;
        }

        if (isIOS) {
          window.location.href = appUrl;
          return;
        }

        redirectToStore();
      }

      // This is where the link should be handelded in your application.
      // Read "sourceUrl" and all query arguments from the incoming deep link.
      tryOpenApp();
    })();
  </script>
</body>
</html>
