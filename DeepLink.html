<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deep Link Test</title>
</head>
<body>
  <h1>Deep Link Test</h1>
  <p id="status">Preparing deep link...</p>
  <a id="open-app-link" href="conductrtest://open">Open App</a>

  <script>
    (function () {
      const deepLinkBase = "conductrtest://open";
      const playStoreHomeUrl = "https://play.google.com/store";
      const currentUrl = window.location.href;
      const pageUrl = new URL(currentUrl);
      const params = new URLSearchParams(pageUrl.search);

      // Ensure the complete source URL is always included.
      params.set("source", currentUrl);

      const query = params.toString();
      const deepLinkUrl = deepLinkBase + (query ? "?" + query : "") + (pageUrl.hash || "");
      const statusElement = document.getElementById("status");
      const openAppLink = document.getElementById("open-app-link");

      openAppLink.href = deepLinkUrl;
      statusElement.textContent = "Deep link: " + deepLinkUrl;

      let appOpened = false;
      const markAppOpened = function () {
        appOpened = true;
      };

      window.addEventListener("pagehide", markAppOpened);
      window.addEventListener("blur", markAppOpened);
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") {
          markAppOpened();
        }
      });

      // Attempt auto-open.
      window.location.href = deepLinkUrl;

      // If app did not open, redirect to Google Play home page.
      window.setTimeout(function () {
        if (!appOpened && document.visibilityState === "visible") {
          statusElement.textContent = "App not detected. Redirecting to Google Play Store...";
          window.location.replace(playStoreHomeUrl);
        }
      }, 1800);
    })();
  </script>
</body>
</html>
