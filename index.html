<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wand Linked</title>
  <style>
    :root {
      --bg-dark: #1a1410;
      --bg-deep: #2b2118;
      --parchment: #eadfbe;
      --parchment-dark: #d6c59a;
      --ink: #2a1d12;
      --gold: #c9a44c;
      --gold-soft: #e1c97a;
      --shadow: rgba(0, 0, 0, 0.35);
      --glow: rgba(201, 164, 76, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(201, 164, 76, 0.08), transparent 35%),
        linear-gradient(180deg, var(--bg-dark), var(--bg-deep));
      color: var(--ink);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      overflow: hidden;
      position: relative;
    }

    .dust,
    .dust::before,
    .dust::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255, 236, 183, 0.7) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(201, 164, 76, 0.6) 0 1px, transparent 1.5px);
      background-size: 160px 160px, 220px 220px;
      background-position: 20px 30px, 80px 90px;
      opacity: 0.2;
      animation: floatDust 18s linear infinite;
    }

    .dust::before {
      opacity: 0.14;
      animation-duration: 24s;
    }

    .dust::after {
      opacity: 0.1;
      animation-duration: 30s;
    }

    @keyframes floatDust {
      from { transform: translateY(0); }
      to { transform: translateY(-35px); }
    }

    .card {
      width: 100%;
      max-width: 420px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.04)),
        linear-gradient(180deg, var(--parchment), var(--parchment-dark));
      border: 2px solid rgba(90, 62, 22, 0.9);
      border-radius: 20px;
      padding: 28px 22px;
      text-align: center;
      position: relative;
      box-shadow:
        0 16px 40px var(--shadow),
        0 0 30px var(--glow);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(120, 88, 32, 0.65);
      border-radius: 14px;
      pointer-events: none;
    }

    .crest {
      width: 88px;
      height: 88px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 38px;
      color: var(--gold-soft);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.18), transparent 35%),
        linear-gradient(180deg, #4b3724, #2f2218);
      border: 2px solid var(--gold);
      box-shadow:
        inset 0 0 18px rgba(255,255,255,0.06),
        0 0 20px var(--glow);
    }

    .status {
      display: inline-block;
      padding: 7px 14px;
      border: 1px solid rgba(120, 88, 32, 0.6);
      border-radius: 999px;
      background: rgba(255, 248, 220, 0.35);
      color: #5a3e16;
      font-size: 0.84rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: bold;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 7vw, 2.6rem);
      line-height: 1.08;
      color: #2b1d12;
      text-shadow: 0 1px 0 rgba(255,255,255,0.2);
    }

    .gold {
      color: #7b5a1e;
    }

    p {
      margin: 0 auto;
      max-width: 28ch;
      font-size: 1rem;
      line-height: 1.6;
      color: #4b3724;
    }

    .divider {
      width: 110px;
      height: 2px;
      margin: 22px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      box-shadow: 0 0 10px var(--glow);
    }

    .corner {
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: rgba(120, 88, 32, 0.75);
      border-style: solid;
      pointer-events: none;
    }

    .corner.tl {
      top: 14px;
      left: 14px;
      border-width: 2px 0 0 2px;
      border-top-left-radius: 8px;
    }

    .corner.tr {
      top: 14px;
      right: 14px;
      border-width: 2px 2px 0 0;
      border-top-right-radius: 8px;
    }

    .corner.bl {
      bottom: 14px;
      left: 14px;
      border-width: 0 0 2px 2px;
      border-bottom-left-radius: 8px;
    }

    .corner.br {
      bottom: 14px;
      right: 14px;
      border-width: 0 2px 2px 0;
      border-bottom-right-radius: 8px;
    }

    @media (max-width: 380px) {
      .card {
        padding: 24px 18px;
      }

      .crest {
        width: 76px;
        height: 76px;
        font-size: 32px;
      }

      p {
        font-size: 0.96rem;
      }
    }
  </style>
</head>
<body>
  <div class="dust" aria-hidden="true"></div>

  <main class="card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="crest" aria-hidden="true">✦</div>

    <div class="status">Magical Connection Complete</div>

    <h1>Your wand is now <span class="gold">linked</span></h1>
    <p>
      The binding spell has taken hold. Your wand is connected and ready for use.
    </p>

    <div class="divider" aria-hidden="true"></div>
  </main>
</body>
</html>
